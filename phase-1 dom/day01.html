<!DOCTYPE html>
<html>
<head>
  <title>DOM Practice</title>
</head>
<body>

  <h1 id="heading">Namaste Duniya!</h1>
  <p class="info">This is my first DOM experiment</p>
  <button onclick="changeText()">Change Text </button>
  <button onclick="changeColor()">Change Color</button>
  <button onclick="addElement()">Add new Element</button>

  <script>
    function changeText() {
      let h1 = document.querySelector("#heading");
      h1.textContent = "DOM has changed the text!";
    }

    function changeColor() {
      let para = document.querySelector(".info");
      para.style.color = "purple";
      para.style.fontSize = "20px";
    }

    function addElement() {
      let newPara = document.createElement("p");
      newPara.textContent = "Main JavaScript has created this!";
      newPara.style.color = "green";
      document.body.appendChild(newPara);
    }
    </script>



    <input id="nameInput" type="text" placeholder="Enter your name">
    <button onclick="greet()">Greet</button>

   
       <script>
        function greet() {
            let name = document.querySelector("#nameInput").value;
            document.querySelector("#heading").textContent = "Namaste, " + name + "!";
        }
        
        </script>
  
    

</body>
</html>
