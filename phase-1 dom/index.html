<!DOCTYPE html>
<html>
<head>
  <title>My To-Do App</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    h1 { color: purple; }
    .input-box { display: flex; gap: 8px; margin-bottom: 20px; }
    input { flex: 1; padding: 8px 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; }
    .add-btn { background: purple; color: white; }
    li { display: flex; justify-content: space-between; align-items: center;
         padding: 10px; margin-bottom: 8px; background: #f3f3f3; border-radius: 6px; }
    li.done span { text-decoration: line-through; color: gray; }
    .del-btn { background: #ff4444; color: white; border: none;
               padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    #empty-msg { color: gray; font-style: italic; }
  </style>
</head>
<body>

  <h1>Meri To-Do List</h1>

  <div class="input-box">
    <input id="taskInput" type="text" placeholder="What to do ?">
    <button class="add-btn" id="addBtn">Add</button>
  </div>

  <ul id="taskList"></ul>
  <p id="empty-msg">No tasks yet!</p>

  <script>
    let taskInput = document.querySelector("#taskInput");
    let taskList  = document.querySelector("#taskList");
    let emptyMsg  = document.querySelector("#empty-msg");

    // Task add karo
    function addTask() {
      let text = taskInput.value.trim();
      if (text === "") {
        alert("Please enter a task!");
        return;
      }

      // li element banao
      let li = document.createElement("li");

      // span mein task text
      let span = document.createElement("span");
      span.textContent = text;

      // click karo span pe — done/undone toggle
      span.addEventListener("click", function() {
        li.classList.toggle("done");
      });

      // delete button
      let delBtn = document.createElement("button");
      delBtn.textContent = "Delete";
      delBtn.classList.add("del-btn");
      delBtn.addEventListener("click", function() {
        li.remove();
        checkEmpty();
      });

      li.appendChild(span);
      li.appendChild(delBtn);
      taskList.appendChild(li);

      taskInput.value = "";   // input clear karo
      emptyMsg.style.display = "none";
    }

    // Empty check
    function checkEmpty() {
      if (taskList.children.length === 0) {
        emptyMsg.style.display = "block";
      }
    }

    // Button click pe add
    document.querySelector("#addBtn").addEventListener("click", addTask);

    // Enter dabaane pe bhi add ho
    taskInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") addTask();
    });
  </script>

</body>
</html>
